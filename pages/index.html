<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plume 2D</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; overflow: hidden; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: #121620;
        color: #c8cdd5;
      }
      nav {
        display: flex;
        align-items: center;
        height: 44px;
        padding: 0 16px;
        background: #1a1f2e;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        gap: 16px;
      }
      .brand {
        font-size: 15px;
        font-weight: 700;
        color: #e94560;
        letter-spacing: 0.3px;
      }
      .sep {
        width: 1px;
        height: 22px;
        background: rgba(255,255,255,0.08);
      }
      .tabs { display: flex; gap: 4px; }
      .tab {
        padding: 6px 16px;
        border-radius: 6px;
        border: 1px solid transparent;
        background: none;
        color: #8a90a0;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
      }
      .tab:hover {
        background: rgba(255,255,255,0.05);
        color: #c8cdd5;
      }
      .tab.active {
        background: rgba(233,69,96,0.12);
        border-color: rgba(233,69,96,0.3);
        color: #e94560;
      }
      .spacer { flex: 1; }
      .github-link {
        color: #5a6070;
        text-decoration: none;
        font-size: 13px;
        transition: color 0.15s;
      }
      .github-link:hover { color: #9aa0ab; }
      iframe {
        width: 100%;
        height: calc(100vh - 44px);
        border: none;
        display: block;
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="brand">Plume 2D</div>
      <div class="sep"></div>
      <div class="tabs">
        <button class="tab active" data-page="demo">Demo</button>
        <button class="tab" data-page="docs">Documentation</button>
      </div>
      <div class="spacer"></div>
      <a class="github-link" href="https://github.com/LeoRousseau/plume-2d" target="_blank">GitHub</a>
    </nav>
    <iframe id="content" src="demo/index.html"></iframe>
    <script>
      const tabs = document.querySelectorAll('.tab');
      const iframe = document.getElementById('content');

      function switchTo(page) {
        tabs.forEach(t => t.classList.toggle('active', t.dataset.page === page));
        iframe.src = page === 'demo' ? 'demo/index.html' : 'docs/index.html';
        location.hash = page;
      }

      tabs.forEach(t => t.addEventListener('click', () => switchTo(t.dataset.page)));

      const initial = location.hash.replace('#', '');
      if (initial === 'docs') switchTo('docs');
    </script>
  </body>
</html>
