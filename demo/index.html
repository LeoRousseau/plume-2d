<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plume 2D — Editor Demo</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #121620;
        color: #c8cdd5;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        font-size: 13px;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      /* --- Toolbar (top) --- */
      #toolbar {
        display: flex;
        align-items: center;
        gap: 3px;
        padding: 8px 14px;
        background: #1a1f2e;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        flex-shrink: 0;
      }
      #toolbar #logo {
        height: 32px;
        filter: drop-shadow(0 0 4px rgba(233,69,96,0.3));
      }
      #toolbar .sep {
        width: 1px;
        height: 26px;
        background: rgba(255,255,255,0.08);
        margin: 0 8px;
      }
      #toolbar button {
        padding: 6px 12px;
        background: rgba(255,255,255,0.05);
        color: #9aa0ab;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        transition: all 0.15s;
      }
      #toolbar button:hover { background: rgba(255,255,255,0.1); color: #ddd; }
      #toolbar button.active {
        background: rgba(233,69,96,0.15);
        border-color: rgba(233,69,96,0.4);
        color: #e94560;
      }
      #toolbar button.danger {
        background: rgba(255,60,60,0.08);
        border-color: rgba(255,60,60,0.15);
        color: #b55;
      }
      #toolbar button.danger:hover {
        background: rgba(255,60,60,0.15);
        color: #e66;
      }

      /* --- Main area --- */
      #main {
        display: flex;
        flex: 1;
        min-height: 0;
      }

      /* --- Style panel (left) --- */
      #style-panel {
        width: 200px;
        background: #1a1f2e;
        border-right: 1px solid rgba(255,255,255,0.06);
        padding: 12px;
        overflow-y: auto;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      #style-panel h3 {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: #5a6070;
        margin-top: 10px;
        font-weight: 600;
      }
      #style-panel h3:first-child { margin-top: 0; }
      #style-panel label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #8a90a0;
      }
      #style-panel input[type="color"] {
        width: 28px;
        height: 22px;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 4px;
        background: none;
        cursor: pointer;
      }
      #style-panel input[type="range"] {
        flex: 1;
        max-width: 80px;
        accent-color: #e94560;
      }
      #style-panel select {
        background: rgba(255,255,255,0.05);
        color: #b0b5c0;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 4px;
        padding: 3px 6px;
        font-size: 12px;
      }
      #style-panel input[type="checkbox"] {
        accent-color: #e94560;
      }

      /* --- Canvas area (center) --- */
      #canvas-wrap {
        flex: 1;
        display: flex;
        align-items: stretch;
        justify-content: stretch;
        position: relative;
        min-width: 0;
        background: #0e1117;
      }
      canvas {
        width: 100%;
        height: 100%;
        display: block;
        cursor: crosshair;
      }
      #info {
        position: absolute;
        bottom: 10px;
        right: 10px;
        background: rgba(15,17,23,0.85);
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid rgba(255,255,255,0.06);
        font-size: 11px;
        font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
        color: #7a8090;
        max-width: 350px;
        white-space: pre-wrap;
        pointer-events: none;
      }

      /* --- Scene tree (right) --- */
      #scene-tree {
        width: 220px;
        background: #1a1f2e;
        border-left: 1px solid rgba(255,255,255,0.06);
        padding: 12px;
        overflow-y: auto;
        flex-shrink: 0;
      }
      #scene-tree h3 {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: #5a6070;
        margin-bottom: 8px;
        font-weight: 600;
      }
      .tree-row {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 4px 6px;
        border-radius: 4px;
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .scene-tree-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .tree-delete-btn {
        background: rgba(255,60,60,0.1);
        border: 1px solid rgba(255,60,60,0.2);
        color: #e66;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        padding: 2px 7px;
        transition: all 0.15s;
      }
      .tree-delete-btn:hover { background: rgba(255,60,60,0.25); }
      .tree-row { cursor: pointer; }
      .tree-row:hover { background: rgba(255,255,255,0.04); }
      .tree-row.selected { background: rgba(233,69,96,0.12); }
      .vis-toggle {
        cursor: default;
        font-size: 11px;
        opacity: 0.4;
        min-width: 16px;
        text-align: center;
      }
      .tree-icon {
        min-width: 16px;
        text-align: center;
        opacity: 0.5;
        color: #e94560;
      }
      .tree-label {
        overflow: hidden;
        text-overflow: ellipsis;
        color: #8a90a0;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <img id="logo" alt="Plume 2D" height="24">
      <div class="sep"></div>
      <button id="tool-select" class="active" title="Select (V)">▹ Select</button>
      <button id="tool-circle" title="Circle (C)">● Circle</button>
      <button id="tool-rect" title="Rectangle (R)">■ Rect</button>
      <button id="tool-ellipse" title="Ellipse (E)">⬮ Ellipse</button>
      <button id="tool-polyline" title="Polyline (P)">⏤ Polyline</button>
      <button id="tool-path" title="Path (B)">∿ Path</button>
      <button id="tool-text" title="Text (T)">T Text</button>
      <div class="sep"></div>
      <button id="btn-clear" class="danger" title="Clear scene">Clear</button>
      <button id="btn-export-svg" title="Export SVG">Export SVG</button>
      <button id="btn-import-svg" title="Import SVG">Import SVG</button>
    </div>
    <div id="main">
      <div id="style-panel"></div>
      <div id="canvas-wrap">
        <canvas id="plume-canvas"></canvas>
        <div id="info"></div>
      </div>
      <div id="scene-tree"></div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
